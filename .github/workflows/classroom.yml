name: Autograding Tests
on:
  - push
  - workflow_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile soal1
        run: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c

      - name: Test Case 1
        id: tc1
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC1 - N=1"
          setup-command: ""
          command: bash -c 'expected=$'"'"'1'"'"'; out=$(printf "1\n" | ./soal1 | tr -d "\r" | sed -z "s/[[:space:]]*$//"); [[ "$out" == "$expected" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 2
        id: tc2
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC2 - N=2"
          setup-command: ""
          command: bash -c 'expected=$'"'"'1\nKUNING'"'"'; out=$(printf "2\n" | ./soal1 | tr -d "\r" | sed -z "s/[[:space:]]*$//"); [[ "$out" == "$expected" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 3
        id: tc3
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC3 - N=3"
          setup-command: ""
          command: bash -c 'expected=$'"'"'1\nKUNING\nMERAH'"'"'; out=$(printf "3\n" | ./soal1 | tr -d "\r" | sed -z "s/[[:space:]]*$//"); [[ "$out" == "$expected" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 4
        id: tc4
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC4 - N=4"
          setup-command: ""
          command: bash -c 'expected=$'"'"'1\nKUNING\nMERAH\nKUNING'"'"'; out=$(printf "4\n" | ./soal1 | tr -d "\r" | sed -z "s/[[:space:]]*$//"); [[ "$out" == "$expected" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 5
        id: tc5
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC5 - N=5"
          setup-command: ""
          command: bash -c 'expected=$'"'"'1\nKUNING\nMERAH\nKUNING\n5'"'"'; out=$(printf "5\n" | ./soal1 | tr -d "\r" | sed -z "s/[[:space:]]*$//"); [[ "$out" == "$expected" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 6
        id: tc6
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC6 - N=6"
          setup-command: ""
          command: bash -c 'expected=$'"'"'1\nKUNING\nMERAH\nKUNING\n5\nBIRU'"'"'; out=$(printf "6\n" | ./soal1 | tr -d "\r" | sed -z "s/[[:space:]]*$//"); [[ "$out" == "$expected" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 7
        id: tc7
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC7 - N=7"
          setup-command: ""
          command: bash -c 'expected=$'"'"'1\nKUNING\nMERAH\nKUNING\n5\nBIRU\n7'"'"'; out=$(printf "7\n" | ./soal1 | tr -d "\r" | sed -z "s/[[:space:]]*$//"); [[ "$out" == "$expected" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 8
        id: tc8
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC8 - N=8"
          setup-command: ""
          command: bash -c 'expected=$'"'"'1\nKUNING\nMERAH\nKUNING\n5\nBIRU\n7\nKUNING'"'"'; out=$(printf "8\n" | ./soal1 | tr -d "\r" | sed -z "s/[[:space:]]*$//"); [[ "$out" == "$expected" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 9
        id: tc9
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC9 - N=9"
          setup-command: ""
          command: bash -c 'expected=$'"'"'1\nKUNING\nMERAH\nKUNING\n5\nBIRU\n7\nKUNING\nMERAH'"'"'; out=$(printf "9\n" | ./soal1 | tr -d "\r" | sed -z "s/[[:space:]]*$//"); [[ "$out" == "$expected" ]]'
          timeout: 2
          max-score: 10

      - name: Test Case 10
        id: tc10
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TC10 - N=12"
          setup-command: ""
          command: bash -c 'expected=$'"'"'1\nKUNING\nMERAH\nKUNING\n5\nBIRU\n7\nKUNING\nMERAH\nKUNING\n11\nBIRU'"'"'; out=$(printf "12\n" | ./soal1 | tr -d "\r" | sed -z "s/[[:space:]]*$//"); [[ "$out" == "$expected" ]]'
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          TC1_RESULTS: "${{steps.tc1.outputs.result}}"
          TC2_RESULTS: "${{steps.tc2.outputs.result}}"
          TC3_RESULTS: "${{steps.tc3.outputs.result}}"
          TC4_RESULTS: "${{steps.tc4.outputs.result}}"
          TC5_RESULTS: "${{steps.tc5.outputs.result}}"
          TC6_RESULTS: "${{steps.tc6.outputs.result}}"
          TC7_RESULTS: "${{steps.tc7.outputs.result}}"
          TC8_RESULTS: "${{steps.tc8.outputs.result}}"
          TC9_RESULTS: "${{steps.tc9.outputs.result}}"
          TC10_RESULTS: "${{steps.tc10.outputs.result}}"
        with:
          runners: tc1,tc2,tc3,tc4,tc5,tc6,tc7,tc8,tc9,tc10
